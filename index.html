<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>The House of Napoleon</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>

    /* ========= RESET ========= */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f7f3ef;
      overflow-x: hidden;

      font-family: 'DM Sans', sans-serif;
      color: #111;
    }

    /* ========= HERO ========= */

    .hero {
      position: relative;

      width: 100%;
      min-height: 100vh;

      overflow: hidden;

      background: #f7f3ef;
    }

    /* ========= BACKGROUND ========= */

    .hero-bg {
      position: absolute;
      inset: 0;

      background-image: url('realhero.png');

      background-repeat: no-repeat;

      background-size: 82%;

      background-position: 108% 8%;

      z-index: 1;

      filter:
        brightness(0.96)
        saturate(0.92)
        contrast(0.95);
    }

    /* ========= OVERLAY ========= */

    .hero-overlay {
      position: absolute;
      inset: 0;

      z-index: 2;

      background:
        linear-gradient(
          to right,
          rgba(247,243,239,1) 0%,
          rgba(247,243,239,0.98) 22%,
          rgba(247,243,239,0.92) 36%,
          rgba(247,243,239,0.74) 48%,
          rgba(247,243,239,0.42) 60%,
          rgba(247,243,239,0.10) 76%,
          rgba(247,243,239,0) 90%
        );
    }

    /* ========= LOGO ========= */

    .hero-logo {
      position: absolute;

      top: 42px;
      left: 52%;

      transform: translateX(-50%);

      width: 400px;
      height: auto;

      z-index: 5;

      opacity: 0.94;
    }

    /* ========= CONTENT ========= */

    .hero-content {
      position: relative;

      z-index: 4;

      max-width: 620px;

      padding-left: 74px;
      padding-top: 260px;
      padding-bottom: 120px;
    }

    /* ========= KICKER ========= */

    .hero-kicker {
      margin-bottom: 34px;

      font-size: 0.92rem;
      font-weight: 500;

      line-height: 2;

      letter-spacing: 0.22em;

      color: rgba(0,0,0,0.52);

      text-transform: uppercase;
    }

    /* ========= HEADLINE ========= */

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;

font-size: clamp(3.6rem, 5.5vw, 6rem);
      
      line-height: 0.9;

      letter-spacing: -0.045em;

      font-weight: 400;

      color: #111;
    }

    /* ========= DESCRIPTION ========= */

    .hero-description {
      margin-top: 38px;

      max-width: 560px;

      font-size: 1.45rem;

      line-height: 1.55;

      color: rgba(0,0,0,0.58);
    }

    /* ========= BUTTON ========= */

    .hero-button {
      display: inline-flex;

      align-items: center;
      justify-content: center;

      margin-top: 42px;

      height: 58px;
      padding: 0 36px;

      border-radius: 999px;

      background: #000;

      color: #fff;

      text-decoration: none;

      font-size: 0.92rem;
      font-weight: 600;

      letter-spacing: 0.14em;

      transition:
        transform 0.25s ease,
        opacity 0.25s ease;
    }

    .hero-button:hover {
      transform: translateY(-2px);

      opacity: 0.94;
    }

    /* ========= MOBILE ========= */

    @media (max-width: 1100px) {

      .hero-bg {
        background-size: cover;
        background-position: 62% center;
      }

      .hero-overlay {
        background:
          linear-gradient(
            to bottom,
            rgba(247,243,239,0.74) 0%,
            rgba(247,243,239,0.88) 32%,
            rgba(247,243,239,0.96) 58%,
            rgba(247,243,239,1) 100%
          );
      }

      .hero-logo {
        width: 220px;

        left: 50%;
      }

      .hero-content {
        padding:
          220px 34px 90px 34px;
      }

      .hero h1 {
        font-size: clamp(3.5rem, 12vw, 5rem);
      }

      .hero-description {
        font-size: 1.12rem;
      }
    }

  </style>
</head>

<body>

  <section class="hero">

    <div class="hero-bg"></div>

    <div class="hero-overlay"></div>

    <img
      src="logo transparent.png"
      alt="The House of Napoleon"
      class="hero-logo"
    >

    <div class="hero-content">

      <p class="hero-kicker">
        TIMELESS BY RECIPE.<br>
        MADE FOR TODAY.
      </p>

      <h1>
        Crisp layers.<br>
        Silky cream.<br>
        Pure indulgence.
      </h1>

      <p class="hero-description">
        Our signature Napoleon cakes are handmade in small
        batches using the finest ingredients.
      </p>

      <a href="#order" class="hero-button">
        ORDER NOW
      </a>

    </div>

  </section>

</body>

</html>
